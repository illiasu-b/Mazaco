<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .login-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-align: center; width: 300px; }
  input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; }
  button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; background: #2e7d32; color: #fff; cursor: pointer; }
  button:hover { background: #1b5e20; }
  #errorMessage { color: red; min-height: 18px; margin-top: 10px; }
</style>
</head>
<body>

<div class="login-container">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <div id="errorMessage"></div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
